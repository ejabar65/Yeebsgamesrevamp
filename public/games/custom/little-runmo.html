<!DOCTYPE html>
<html>
<head>
    <title>Little Runmo</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); background: #111; max-width: 90vw; max-height: 70vh; }
        h1 { font-style: italic; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 20px; }
        .controls { margin-top: 20px; color: #666; font-size: 12px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Runmo <span style="color: #3b82f6">Infinite</span></h1>
    <canvas id="game" width="800" height="400"></canvas>
    <div class="controls">Space to Jump | Avoid Red Blocks</div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let score = 0;
        let gameOver = false;
        
        const player = { x: 50, y: 300, w: 30, h: 30, dy: 0, jumpPower: -12, gravity: 0.6, grounded: false };
        const obstacles = [];
        
        function spawnObstacle() {
            if (gameOver) return;
            obstacles.push({ x: 800, y: 300, w: 30, h: 30, speed: 5 + (score / 500) });
            setTimeout(spawnObstacle, 1500 + Math.random() * 2000);
        }
        
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (gameOver) {
                    location.reload();
                    return;
                }
                if (player.grounded) {
                    player.dy = player.jumpPower;
                    player.grounded = false;
                }
            }
        });

        function update() {
            if (gameOver) return;
            
            player.dy += player.gravity;
            player.y += player.dy;
            
            if (player.y > 300) {
                player.y = 300;
                player.dy = 0;
                player.grounded = true;
            }
            
            obstacles.forEach((obs, i) => {
                obs.x -= obs.speed;
                if (obs.x < -50) obstacles.splice(i, 1);
                
                // Collision
                if (
                    player.x < obs.x + obs.w &&
                    player.x + player.w > obs.x &&
                    player.y < obs.y + obs.h &&
                    player.y + player.h > obs.y
                ) {
                    gameOver = true;
                }
            });
            score++;
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 400);
            
            // Ground
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 330, 800, 70);
            
            // Player
            ctx.fillStyle = '#3b82f6';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            
            // Obstacles
            ctx.fillStyle = '#ef4444';
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            });
            
            // UI
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px sans-serif';
            ctx.fillText(`SCORE: ${Math.floor(score/10)}`, 20, 40);
            
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, 800, 400);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 40px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('MISSION FAILED', 400, 200);
                ctx.font = '20px sans-serif';
                ctx.fillText('SPACE TO REBOOT', 400, 250);
            }
            
            requestAnimationFrame(() => {
                update();
                draw();
            });
        }
        
        spawnObstacle();
        draw();
    </script>
</body>
</html>
